<!DOCTYPE html>
<html>
<head>
    <title>My Mobile Website</title>
    <style>
        /* This is the CSS (The Clothes) */
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding: 50px;
        }
        h1 { color: #2c3e50; }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Website</h1>
    <p>I built this on my phone!</p>
    
    <button onclick="showAlert()">Click Me</button>

    <script>
        // This is JavaScript (The Brain)
        function showAlert() {
            alert("Hello! You just ran your first web code!");
        }
    </script>

</body>
</html>
